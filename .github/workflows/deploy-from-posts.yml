# Reusable workflow: build this repo (static generator) + Markdown from the *caller's* repo, deploy to caller's GitHub Pages.
#
# Public engine: https://github.com/StCost/blog — posts-only repos call this file via workflow_call.
# See: examples/posts-only-repo/.github/workflows/deploy.yml

on:
  workflow_call:
    inputs:
      engine_repository:
        description: "Blog engine on GitHub (owner/name), e.g. StCost/blog"
        type: string
        required: true
      engine_ref:
        description: "Git ref (branch or tag) of the engine repo to build with"
        type: string
        required: false
        default: "main"
      posts_subpath:
        description: "Optional path inside the posts checkout where *.md live (e.g. content/posts). Leave empty if .md files are at the repo root."
        type: string
        required: false
        default: ""
      site_title:
        description: "Overrides engine default site title (empty = use engine src/config.js title)"
        type: string
        required: false
        default: ""
      site_tagline:
        description: "Overrides engine default tagline (empty = use engine default)"
        type: string
        required: false
        default: ""
      site_company_name:
        description: "Overrides footer company / copyright name (empty = use engine default)"
        type: string
        required: false
        default: ""

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-${{ github.repository }}"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout blog engine
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.engine_repository }}
          ref: ${{ inputs.engine_ref }}
          path: engine

      - name: Checkout posts (calling repository)
        uses: actions/checkout@v4
        with:
          path: posts

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: engine/package-lock.json

      - name: Install and build
        working-directory: engine
        env:
          SITE_URL: https://${{ github.repository_owner }}.github.io
          BASE_PATH: /${{ github.event.repository.name }}/
          POSTS_SUBPATH: ${{ inputs.posts_subpath }}
          SITE_TITLE: ${{ inputs.site_title }}
          SITE_TAGLINE: ${{ inputs.site_tagline }}
          SITE_COMPANY_NAME: ${{ inputs.site_company_name }}
          GITHUB_EDIT_REPO: ${{ github.repository }}
          GITHUB_POSTS_PATH: ${{ inputs.posts_subpath }}
        run: |
          set -e
          if [ -n "$POSTS_SUBPATH" ]; then
            export POSTS_DIR="$GITHUB_WORKSPACE/posts/$POSTS_SUBPATH"
          else
            export POSTS_DIR="$GITHUB_WORKSPACE/posts"
          fi
          npm ci
          npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: engine/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
