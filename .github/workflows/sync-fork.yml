name: Sync fork with upstream

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *" # every 6 hours

permissions:
  contents: write
  # Required so we can workflow_dispatch deploy after push; GITHUB_TOKEN pushes do not trigger push workflows.
  actions: write

jobs:
  sync:
    # Only meaningful on forks; skip on the upstream repo itself
    if: ${{ github.event.repository.fork }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Resolve upstream (parent) repo
        id: upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          parent_clone_url="$(gh api "repos/${GITHUB_REPOSITORY}" --jq '.parent.clone_url // empty')"
          parent_full_name="$(gh api "repos/${GITHUB_REPOSITORY}" --jq '.parent.full_name // empty')"

          if [ -z "$parent_clone_url" ]; then
            echo "No parent repo found (not a fork?); skipping."
            echo "clone_url=" >> "$GITHUB_OUTPUT"
            echo "full_name=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "clone_url=$parent_clone_url" >> "$GITHUB_OUTPUT"
          echo "full_name=$parent_full_name" >> "$GITHUB_OUTPUT"

      - name: Add upstream remote
        if: ${{ steps.upstream.outputs.clone_url != '' }}
        run: |
          git remote add upstream "${{ steps.upstream.outputs.clone_url }}"
          git fetch upstream --prune

      - name: Check if sync is needed
        id: sync_check
        if: ${{ steps.upstream.outputs.clone_url != '' }}
        run: |
          git checkout main
          local_sha="$(git rev-parse main)"
          upstream_sha="$(git rev-parse upstream/main)"

          echo "local_sha=$local_sha" >> "$GITHUB_OUTPUT"
          echo "upstream_sha=$upstream_sha" >> "$GITHUB_OUTPUT"

          if [ "$local_sha" = "$upstream_sha" ]; then
            echo "needs_sync=false" >> "$GITHUB_OUTPUT"
            echo "main is already up to date with upstream/main; skipping."
          else
            echo "needs_sync=true" >> "$GITHUB_OUTPUT"
            echo "main differs from upstream/main; syncing."
          fi

      - name: Reset local main to upstream/main
        if: ${{ steps.upstream.outputs.clone_url != '' && steps.sync_check.outputs.needs_sync == 'true' }}
        run: |
          git checkout main
          git reset --hard upstream/main

      - name: Force push synced main to fork
        if: ${{ steps.upstream.outputs.clone_url != '' && steps.sync_check.outputs.needs_sync == 'true' }}
        run: |
          git push origin main --force

      - name: Trigger GitHub Pages deploy
        if: ${{ steps.upstream.outputs.clone_url != '' && steps.sync_check.outputs.needs_sync == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml --ref main

      - name: No changes to sync
        if: ${{ steps.upstream.outputs.clone_url != '' && steps.sync_check.outputs.needs_sync == 'false' }}
        run: echo "Fork main already matches upstream/main."

