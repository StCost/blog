name: Sync fork with upstream

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *" # every 6 hours

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    # Only meaningful on forks; skip on the upstream repo itself
    if: ${{ github.event.repository.fork }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Resolve upstream (parent) repo
        id: upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          parent_clone_url="$(gh api "repos/${GITHUB_REPOSITORY}" --jq '.parent.clone_url // empty')"
          parent_full_name="$(gh api "repos/${GITHUB_REPOSITORY}" --jq '.parent.full_name // empty')"

          if [ -z "$parent_clone_url" ]; then
            echo "No parent repo found (not a fork?); skipping."
            echo "clone_url=" >> "$GITHUB_OUTPUT"
            echo "full_name=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "clone_url=$parent_clone_url" >> "$GITHUB_OUTPUT"
          echo "full_name=$parent_full_name" >> "$GITHUB_OUTPUT"

      - name: Add upstream remote
        if: ${{ steps.upstream.outputs.clone_url != '' }}
        run: |
          git remote add upstream "${{ steps.upstream.outputs.clone_url }}"
          git fetch upstream --prune

      - name: Merge upstream/main into local main
        if: ${{ steps.upstream.outputs.clone_url != '' }}
        run: |
          git checkout main
          git merge --no-edit upstream/main

      - name: Create PR (upstream -> fork)
        if: ${{ steps.upstream.outputs.clone_url != '' }}
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: sync upstream"
          title: "chore: sync from upstream"
          body: |
            Automated sync PR.

            Upstream: `${{ steps.upstream.outputs.full_name }}`
            Branch: `upstream/main` -> `main`
          branch: "automation/sync-upstream"
          delete-branch: true

