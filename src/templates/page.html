<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{SITE_TITLE}}</title>
    <meta name="description" content="{{SITE_TAGLINE}}" />
    <link rel="canonical" href="{{CANONICAL_URL}}" />

    <meta property="og:title" content="{{SITE_TITLE}}" />
    <meta property="og:description" content="{{SITE_TAGLINE}}" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="{{CANONICAL_URL}}" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{SITE_TITLE}}" />
    <meta name="twitter:description" content="{{SITE_TAGLINE}}" />
    <link rel="stylesheet" href="{{BASE_PATH}}assets/theme.css" />
    <link rel="stylesheet" href="{{BASE_PATH}}assets/styles.css" />
    <link rel="stylesheet" href="{{BASE_PATH}}assets/highlight.css" />
    <script defer src="{{BASE_PATH}}assets/app.js"></script>
  </head>
  <body>
    <div class="container">
      <header class="site-header">
        <div>
          <h1 class="site-title">{{SITE_TITLE}}</h1>
          <p class="site-tagline">{{SITE_TAGLINE}}</p>
        </div>
      </header>

      <main class="posts">
        {{POST_LIST}}
      </main>

      {{PAGINATION}}

      <section class="new-post-section">
        <a
          class="new-post-button"
          id="new-post-button"
          href="#"
          data-filename="{{NEW_POST_FILENAME}}"
        >
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="currentColor"
            aria-hidden="true"
          >
            <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" />
          </svg>
          <span>New Post</span>
        </a>
      </section>
    </div>
  </body>
</html>
