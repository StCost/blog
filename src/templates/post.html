<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{POST_TITLE}} · {{SITE_TITLE}}</title>
    <meta name="description" content="{{POST_EXCERPT}}" />
    <link rel="canonical" href="{{CANONICAL_URL}}" />

    <meta property="og:title" content="{{POST_TITLE}} · {{SITE_TITLE}}" />
    <meta property="og:description" content="{{POST_EXCERPT}}" />
    <meta property="og:type" content="article" />
    <meta property="og:url" content="{{CANONICAL_URL}}" />
    {{OG_IMAGE_META}}

    <meta name="twitter:card" content="{{TWITTER_CARD}}" />
    <meta name="twitter:title" content="{{POST_TITLE}} · {{SITE_TITLE}}" />
    <meta name="twitter:description" content="{{POST_EXCERPT}}" />
    {{TWITTER_IMAGE_META}}
    <link rel="icon" type="image/svg+xml" href="{{BASE_PATH}}assets/favicon.svg" />
    <link rel="stylesheet" href="{{BASE_PATH}}assets/theme.css" />
    <link rel="stylesheet" href="{{BASE_PATH}}assets/styles.css" />
    <link rel="stylesheet" href="{{BASE_PATH}}assets/highlight.css" />
    <script defer src="{{BASE_PATH}}assets/app.js"></script>
  </head>
  <body>
    <div class="container">
      <div class="post-topbar">
        <a class="back-link" href="{{BASE_PATH}}index.html">{{BACK_TO_POSTS}}</a>
        <a
          class="github-edit-button"
          id="github-edit-button"
          href="#"
          data-filename="{{POST_SOURCE_FILENAME}}"
        >
          Edit on GitHub
        </a>
      </div>
      <article class="card post-content">
        <h1 class="post-page-title">{{POST_TITLE}}</h1>
        {{POST_HTML}}
      </article>

      <footer class="site-footer">
        <p class="footer-text">{{FOOTER_TEXT}}</p>
      </footer>
    </div>
  </body>
</html>
