<!doctype html>
<html
  lang="en"
  data-gh-repo="{{GITHUB_EDIT_REPO}}"
  data-gh-branch="{{GITHUB_DEFAULT_BRANCH}}"
  data-gh-posts-dir="{{GITHUB_POSTS_PATH}}"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    {{GOOGLE_SITE_VERIFICATION_META}}
    <title>{{POST_TITLE}}</title>
    <meta name="description" content="{{POST_EXCERPT}}" />
    <link rel="canonical" href="{{CANONICAL_URL}}" />

    <meta property="og:title" content="{{POST_TITLE}}" />
    <meta property="og:description" content="{{POST_EXCERPT}}" />
    <meta property="og:type" content="article" />
    <meta property="og:url" content="{{CANONICAL_URL}}" />
    {{OG_IMAGE_META}}

    <meta name="twitter:card" content="{{TWITTER_CARD}}" />
    <meta name="twitter:title" content="{{POST_TITLE}}" />
    <meta name="twitter:description" content="{{POST_EXCERPT}}" />
    {{TWITTER_IMAGE_META}}
    <link rel="icon" type="image/svg+xml" href="{{BASE_PATH}}assets/favicon.svg" />
    <link rel="stylesheet" href="{{BASE_PATH}}assets/theme.css" />
    <link rel="stylesheet" href="{{BASE_PATH}}assets/styles.css" />
    <link rel="stylesheet" href="{{BASE_PATH}}assets/highlight.css" />
    <script defer src="{{BASE_PATH}}assets/app.js"></script>
  </head>
  <body>
    <div class="container">
      <header class="site-header">
        <div>
          <h1 class="site-title">
            <a href="{{BASE_PATH}}">{{SITE_TITLE}}</a>
          </h1>
          <p class="site-tagline">{{SITE_TAGLINE}}</p>
        </div>
      </header>
      <div class="post-topbar">
        <a
          class="back-link"
          id="back-to-posts"
          href="{{BASE_PATH}}"
          data-base-path="{{BASE_PATH}}"
          >{{BACK_TO_POSTS}}</a>
        <a
          class="github-edit-button"
          id="github-edit-button"
          href="#"
          data-filename="{{POST_SOURCE_FILENAME}}"
        >
          Edit on GitHub
        </a>
      </div>
      <article class="card post-content">
        <h1 class="post-page-title">{{POST_TITLE}}</h1>
        {{POST_HTML}}
      </article>

      <div class="bottom-bar">
        <footer class="site-footer">
          <p class="footer-text">{{FOOTER_TEXT}}</p>
        </footer>

        <section class="new-post-section">
          <a
            class="new-post-button"
            id="new-post-button"
            href="#"
            data-filename="{{NEW_POST_FILENAME}}"
          >
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="currentColor"
              aria-hidden="true"
            >
              <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" />
            </svg>
            <span>New Post</span>
          </a>
        </section>
      </div>
    </div>
  </body>
</html>
